{% extends "base.html" %}

{% block content %}
<section>
    <div class="container" style="max-width: 520px;">
        <div class="text-center mb-5">
            <h1 class="section-title">Yönetim Girişi</h1>
            <p class="section-subtitle">Rezervasyon ve blokaj takvimini yönetmek için giriş yapın.</p>
        </div>

        <div class="p-4 p-lg-5" style="background: rgba(255,255,255,0.72); border-radius: 24px; box-shadow: 0 16px 40px rgba(44,42,40,0.06);">
            <form method="POST">
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-block" style="background:#b7754f; color:#fff; border-radius:999px; padding:12px 18px;">
                    Giriş Yap
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
